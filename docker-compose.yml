version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: fishair-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: fishair
      POSTGRES_PASSWORD: fishair_secret
      POSTGRES_DB: fishair
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fishair"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
